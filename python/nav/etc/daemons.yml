# NAV daemons
daemons:
    alertengine:
        description: Dispatches alerts according to individual alert profiles.
        command: alertengine

    eventengine:
        command: eventengine
        description: Reacts and creates alerts from events on the event queue.

    ipdevpoll:
        description: Collects SNMP inventory data from IP devices.
        command: ipdevpolld
        pidfile: ipdevpolld.pid

    pping:
        description: Pings all IP devices for status monitoring.
        command: pping
        # Linux exposes unprivileged ICMP datagram sockets via the
        # net.ipv4.ping_group_range sysctl; if the NAV user's gid is in range,
        # pping can run without root. On non-Linux systems (FreeBSD, macOS),
        # pping still needs root to open ICMP sockets — set this to `true`
        # there. See doc/howto/generic-install-from-source.rst.
        privileged: false

    servicemon:
        description: Monitors configured services.
        command: servicemon

    smsd:
        description: Dispatches queued SMS alerts.
        command: smsd

    snmptrapd:
        description: Receives and processes SNMP traps and notifications.
        command: navtrapd
        privileged: true

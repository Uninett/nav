{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">

<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block head_title %}{% endblock head_title %}</title>
    <link rel="shortcut icon" href="{{ STATIC_URL }}images/main/favicon.ico">
    <link rel="stylesheet" href="{{ STATIC_URL }}css/nav.css" />
    <link rel="stylesheet" href="{{ STATIC_URL }}css/nav/login.css" />
    <script src="{{ STATIC_URL }}js/libs/htmx-2.0.4.min.js"></script>
    {% block extra_head %}
    {% endblock extra_head %}
</head>

<body>
    <div class="row">
        <div class="small-12 column">
            <div class="panel logincontainer">
                <div class="logo-wrapper">
                    <a href="/">
                        <img src="{{ STATIC_URL }}images/main/nav-logo-black.svg" alt="NAV"
                             class="navlogo"/>
                    </a>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert-box {% if message.tags %}{{ message.tags }}{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </div>

    {% block extra_body %}
    {% endblock extra_body %}
</body>

</html>

name: Verify OpenAPI schema snapshot

on:
  push:
    branches:
      - master
      - '[1-9][0-9]?.[0-9]+.x'
  pull_request:

jobs:
  openapi-schema:
    name: Check committed OpenAPI schema is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: |
            pyproject.toml
            **/requirements/*.txt

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: "Install libraries needed to build external dependencies"
        run: |
          set -xe
          sudo apt-get update -y
          sudo apt-get install -y libldap2-dev libsasl2-dev

      - name: "Install test runner dependencies"
        run: uv pip install --system tox tox-uv

      - name: "Check that doc/api/openapi.yml matches the code"
        run: python3 -m tox -e openapi-schema

name: Ensure no fixup! or amend! commits are present

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-forbidden-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Get full history

      - name: Check for fixup! or amend! commits
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          # Make sure the SHAs are present locally
          git fetch --no-tags --prune --depth=0 origin || true
          git fetch origin "$BASE_SHA" "$HEAD_SHA" || true

          COMMITS=$(git log "${BASE_SHA}..${HEAD_SHA}" --pretty=format:"%s" || true)

          echo "Commits between $BASE_SHA and $HEAD_SHA:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -E '^(fixup!|amend!)'; then
            echo "Error: PR contains fixup! or amend! commits. Please squash or rebase before merging."
            exit 1
          fi

name: Build NAV and run full test suite
on:
  push:
    branches:
      - master
      - '[1-9][0-9]?.[0-9]+.x'
  pull_request:
  schedule: # Run daily at 08:00 CEST (06:00 UST)
    - cron: '0 6 * * *'

permissions:
  pull-requests: write

jobs:
  vendor-check:
    name: Check vendored JS libraries
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    outputs:
      result: ${{ steps.gate.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - name: Check if package.json changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
              --paginate -q '.[].filename' | grep -c '^package\.json$' || true)
          else
            changed=$(gh api repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.sha }} \
              --paginate -q '.files[].filename' | grep -c '^package\.json$' || true)
          fi
          if [ "$changed" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.changed == 'true'
        with:
          node-version: 18

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.changed == 'true'
        with:
          python-version: "3.11"

      - name: Install npm dependencies
        if: steps.filter.outputs.changed == 'true'
        run: npm install --legacy-peer-deps

      - name: Check vendored libraries are in sync
        id: check
        if: steps.filter.outputs.changed == 'true'
        run: python3 tools/vendor.py check --no-untracked

      - name: Show what needs updating
        if: failure()
        run: |
          python3 tools/vendor.py sync
          echo "### Changed files" >> "$GITHUB_STEP_SUMMARY"
          git diff --stat python/nav/web/static/js/libs/ >> "$GITHUB_STEP_SUMMARY"
          git diff --stat python/nav/web/static/js/require_config.js >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Vendored JS libraries are out of sync',
              '',
              'This PR updates `package.json` but the vendored library files',
              'in `python/nav/web/static/js/libs/` have not been updated to',
              'match.',
              '',
              '**The test suite has been skipped because its results would not',
              'be meaningful until the vendored libraries are synced.**',
              '',
              'To fix this, run:',
              '```',
              'npm install --legacy-peer-deps',
              'python tools/vendor.py sync',
              'git add python/nav/web/static/js/libs/ python/nav/web/static/js/require_config.js',
              'git commit -m "Sync vendored JS libraries"',
              '```',
              '',
              'See `tools/vendor.py --help` for more options.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Set gate result
        id: gate
        if: always()
        run: |
          if [ "${{ steps.filter.outputs.changed }}" != "true" ]; then
            echo "result=skipped" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.check.outcome }}" = "success" ]; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failure" >> "$GITHUB_OUTPUT"
          fi

  build-and-test:
    name: "Test on Python ${{ matrix.python-version}}"
    needs: vendor-check
    if: >-
      always() && (
        needs.vendor-check.outputs.result != 'failure'
        || github.event_name == 'schedule'
      )
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache-dependency-glob: |
            pyproject.toml
            **/requirements/*.txt

      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: "Set environment variables"
        run: |
          echo "WORKSPACE=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "PGHOST=localhost" >> $GITHUB_ENV
          echo "PGUSER=nav" >> $GITHUB_ENV
          echo "PGPASSWORD=password" >> $GITHUB_ENV

      - name: "Update APT package lists"
        run: |
          sudo apt-get update -y

      - name: "Install test runner dependencies"
        run: |
          set -xe
          uv pip install --system tox tox-uv tox-gh-actions coverage
          sudo apt-get install -y nbtscan


      - name: "Install libraries needed to build external dependencies"
        run: |
          set -xe
          sudo apt-get install -y libldap2-dev libsasl2-dev libtidy5deb1 libsnmp40

      - name: "Set up PostgreSQL"
        uses: ankane/setup-postgres@v1
        with:
          postgres-version: '13'  # minimum NAV requirement
          user: nav
      - name: "Check for Django warnings"
        run: python3 -m tox -e django-warnings
      - name: "Run tests"
        run: |
          export DISPLAY=:99
          ulimit -c unlimited
          sudo sysctl -w kernel.core_pattern=/tmp/core-%e.%p.%h.%t
          python3 -m tox

      - name: Upload Selenium driver logs (${{ matrix.python-version }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-logs-${{ matrix.python-version }}
          path: |
            /tmp/pytest-of-runner

      - name: Upload test reports (${{ matrix.python-version }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.python-version }}
          path: |
            reports/**/*

      - name: Upload core dumps (${{ matrix.python-version }})
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: core-dumps-${{ matrix.python-version }}
          path: |
            /tmp/core-*

      - name: Print stack traces of core dumps (${{ matrix.python-version }})
        if: failure()
        run: |
          sudo apt-get install -y gdb
          set -x
          for core in /tmp/core-*; do
            echo "===== CORE: $core ====="
            file "$core"
            program=$(gdb -ex quit -c "$core" | grep -o "generated by.*" | awk '{print $3}' | tr -d '`')
            gdb -ex bt "$program" "$core"
            echo
          done

  javascript:
    name: "Test Javascript code"
    needs: vendor-check
    if: >-
      always() && (
        needs.vendor-check.outputs.result != 'failure'
        || github.event_name == 'schedule'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: browser-actions/setup-chrome@latest
      - uses: browser-actions/setup-firefox@latest
      - run: chrome --version
      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: npm install
        run: |
          cd python/nav/web/static/js
          npm ci

      - name: npm test
        run: OPENSSL_CONF=/dev/null npm test
        working-directory: ./python/nav/web/static/js

      - name: Upload JavaScript test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: javascript-test-reports
          path: |
            reports/**/*

  upload-pr-number-base-sha:
    name: Save PR number and base SHA in artifact
    runs-on: ubuntu-latest
    if: ${{ github.event.number && always() }}
    env:
      PR_NUMBER: ${{ github.event.number }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Make PR number file
        run: |
          mkdir -p ./extra
          echo $PR_NUMBER > ./extra/pr_number
      - name: Make base SHA file
        run: |
          echo $BASE_SHA > ./extra/base_sha
      - name: Upload PR number file and base SHA file
        uses: actions/upload-artifact@v7
        with:
          name: extra
          path: extra/

      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: ip
        schema:
          type: string
        description: Single IP address or subnet range (e.g. 10.0.42.0/24).
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string

components:
  schemas:
    Account:
      type: object
      description: Serializer for accounts
      properties:
        id:
          type: integer
          readOnly: true
        login:
          type: string
        name:
          type: string
        ext_sync:
          type: string
        preferences:
          type: object
          additionalProperties:
            type: string
            nullable: true
        organizations:
          type: array
          items:
            type: string
        accountgroups:
          type: array
          items:
            type: integer
      required:
      - accountgroups
      - id
      - login
      - name
    AccountGroup:
      type: object
      description: Serializer for accountgroups
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        description:
          type: string
        accounts:
          type: array
          items:
            type: integer
      required:
      - accounts
      - description
      - id
      - name
    Acknowledgement:
      type: object
      description: Serializer for alert acknowledgements
      properties:
        account:
          $ref: '#/components/schemas/AlertAcknowledgementAccount'
        comment:
          type: string
        date:
          type: string
          format: date-time
        comment_html:
          type: string
          readOnly: true
      required:
      - account
      - comment_html
    AggregatedInterface:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        ifname:
          type: string
      required:
      - id
      - ifname
    AlertAcknowledgementAccount:
      type: object
      description: Serializer for Accounts that have acknowledged alerts
      properties:
        id:
          type: integer
          readOnly: true
        login:
          type: string
        name:
          type: string
      required:
      - id
      - login
      - name
    AlertHistory:
      type: object
      description: Serializer for the AlertHistory model
      properties:
        id:
          type: integer
          readOnly: true
        subject:
          type: string
          readOnly: true
        subject_url:
          type: string
          readOnly: true
        subject_type:
          type: string
          readOnly: true
        on_maintenance:
          type: string
          readOnly: true
        event_history_url:
          type: string
          readOnly: true
        netbox_history_url:
          type: string
          readOnly: true
        device_groups:
          type: string
          readOnly: true
        alert_type:
          $ref: '#/components/schemas/AlertType'
        event_type:

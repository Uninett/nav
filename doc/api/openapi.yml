        Search
        ------
        Searches in *ifalias*, *ifdescr* and *ifname*

        Filters
        -------
        - baseport
        - ifadminstatus
        - ifindex
        - ifname
        - ifoperstatus
        - iftype
        - netbox
        - trunk
        - vlan
        - module__name
        - ifclass=[swport, gwport, physicalport, trunk]

        Detail routes
        -------------
        - last_used: interface/<id>/last_used/
        - metrics: interface/<id>/metrics/

        Example: `/api/1/interface/?netbox=91&ifclass=trunk&ifclass=swport`
      parameters:
      - in: query
        name: baseport
        schema:
          type: integer
      - in: query
        name: ifadminstatus
        schema:
          type: integer
          enum:
          - 1
          - 2
          - 3
        description: |-
          * `1` - up
          * `2` - down
          * `3` - testing
      - in: query
        name: ifindex
        schema:
          type: integer
      - in: query
        name: ifname
        schema:
          type: string
      - in: query
        name: ifoperstatus
        schema:
          type: integer
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
        description: |-
          * `1` - up
          * `2` - down
          * `3` - testing
          * `4` - unknown
          * `5` - dormant
          * `6` - not present
          * `7` - lower layer down
      - in: query
        name: iftype
        schema:
          type: integer
      - in: query
        name: module__name
        schema:
          type: string
      - in: query
        name: netbox
        schema:
          type: array
          items:
            type: integer
        explode: true
        style: form
      - name: ordering
